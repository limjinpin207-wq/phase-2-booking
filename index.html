<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phase 2: Anchorvale Cooling Study</title>
    <style>
        /* Classic Academic / Editorial Styling */
        :root {
            --bg-solid: #E2E8F0; /* Solid Slate Blue/Grey */
            --card-bg: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #475569;
            --border-color: #94A3B8;
            --accent-color: #1E3A8A; /* Deep Navy */
            --success-bg: #F0FDF4;
            --success-text: #166534;
            --error-bg: #FEF2F2;
            --error-text: #991B1B;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            background-color: var(--bg-solid);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            box-sizing: border-box;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 40px;
            border: 1px solid var(--border-color);
            box-shadow: 8px 8px 0px var(--border-color); /* Brutalist/Classic shadow, no blur */
            box-sizing: border-box;
        }

        .header-section {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-color);
        }

        .subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.1rem;
            font-style: italic;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            margin-top: 20px;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-family: 'Times New Roman', Times, serif;
            border: 1px solid var(--border-color);
            background-color: #F8FAFC;
            color: var(--text-main);
            appearance: none;
            cursor: pointer;
            border-radius: 0; /* Sharp corners */
        }

        select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: inset 0 0 0 1px var(--accent-color);
        }

        select:disabled {
            background-color: #E2E8F0;
            cursor: not-allowed;
            color: var(--text-muted);
        }

        #calendar-section, #booking-details-section {
            display: none;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .day-btn {
            background-color: #F8FAFC;
            border: 1px solid var(--border-color);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-family: 'Times New Roman', Times, serif;
            color: var(--text-main);
            cursor: pointer;
            transition: background-color 0.1s;
            border-radius: 0;
        }

        .day-btn:hover {
            background-color: #E2E8F0;
        }

        .day-btn.selected {
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
            border-color: var(--accent-color);
        }

        .details-box {
            border: 1px solid var(--border-color);
            padding: 25px;
            background-color: #F8FAFC;
            margin-bottom: 25px;
        }

        .divider {
            border-top: 1px dashed var(--border-color);
            margin: 25px 0;
        }

        .validation-msg {
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            font-weight: bold;
            border: 1px solid transparent;
        }

        .msg-error {
            background-color: var(--error-bg);
            color: var(--error-text);
            border-color: #FCA5A5;
        }

        .msg-success {
            background-color: var(--success-bg);
            color: var(--success-text);
            border-color: #86EFAC;
        }

        .bonus-text {
            display: block;
            margin-top: 5px;
            font-style: italic;
            color: #047857;
        }

        .save-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-family: 'Times New Roman', Times, serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .save-btn:hover:not(:disabled) {
            opacity: 0.9;
        }

        .save-btn:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
        }

        #status-msg {
            text-align: center;
            font-weight: bold;
            margin-top: 20px;
            font-style: italic;
            color: var(--accent-color);
            min-height: 20px;
        }
        
        .main-page-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: var(--accent-color);
            text-decoration: none;
            font-style: italic;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .main-page-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-section">
            <h1>Cooling Appliances Trial</h1>
            <p class="subtitle">Phase 2: Qualitative Results Scheduling</p>
        </div>

        <label for="unit-select">I. Select Assigned Unit</label>
        <select id="unit-select" disabled>
            <option value="" disabled selected id="default-option">Loading database connection...</option>
            <option value="#12-119">Unit #12-119</option>
            <option value="#13-105">Unit #13-105</option>
            <option value="#17-127">Unit #17-127</option>
            <option value="#07-141">Unit #07-141</option>
            <option value="#07-131">Unit #07-131</option>
            <option value="#07-137">Unit #07-137</option>
            <option value="#17-115">Unit #17-115</option>
            <option value="#15-117">Unit #15-117</option>
            <option value="#12-107">Unit #12-107</option>
            <option value="#03-125">Unit #03-125</option>
            <option value="#07-139">Unit #07-139</option>
            <option value="#15-125">Unit #15-125</option>
        </select>

        <div id="calendar-section">
            <label>II. Indicate General Availability (June)</label>
            <div class="calendar-grid" id="calendar-grid"></div>

            <div id="booking-details-section">
                <div class="details-box">
                    <label style="margin-top: 0;">III. Fan Installation Schedule</label>
                    <select id="fan-date-select" onchange="validateSchedule()" style="margin-bottom: 15px;">
                        <option value="">-- Select Installation Date --</option>
                    </select>

                    <select id="fan-time-select" onchange="validateSchedule()">
                        <option value="">-- Select 2-Hour Time Block --</option>
                        <option value="10am-12pm">10:00 AM – 12:00 PM</option>
                        <option value="12pm-2pm">12:00 PM – 2:00 PM</option>
                        <option value="2pm-4pm">2:00 PM – 4:00 PM</option>
                        <option value="4pm-6pm">4:00 PM – 6:00 PM</option>
                    </select>

                    <div class="divider"></div>

                    <label>IV. Qualitative Survey Schedule</label>
                    <select id="survey-date-1" onchange="validateSchedule()" style="margin-bottom: 15px;">
                        <option value="">-- Select First Survey Date (Full Day) --</option>
                    </select>

                    <select id="survey-date-2" onchange="validateSchedule()">
                        <option value="">-- Select Second Survey Date (Full Day) --</option>
                    </select>
                </div>
                
                <div id="validation-msg" class="validation-msg" style="display: none;"></div>
                <button class="save-btn" id="save-btn" onclick="saveData()" disabled>Submit Schedule</button>
            </div>
        </div>

        <div id="status-msg">Establishing secure connection...</div>
        
        <a href="https://jonahchoon.github.io/HDBHeatResilience/" class="main-page-link" target="_blank">Return to Anchorvale Heat Resilience Homepage</a>
    </div>

    <script>
        // --- IMPORTANT: PASTE YOUR APP SCRIPT WEB APP URL HERE ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzP1NP7VOL1V9eJ96qQVC8OTbTzZwu-nP3Qf6IRKMRX8cN9KTlYctWUBmaFlinOICT-/exec";
        
        let database = {};
        const statusMsg = document.getElementById('status-msg');
        const unitSelect = document.getElementById('unit-select');
        const calendarGrid = document.getElementById('calendar-grid');
        
        const bookingSection = document.getElementById('booking-details-section');
        const fanDateSelect = document.getElementById('fan-date-select');
        const fanTimeSelect = document.getElementById('fan-time-select');
        const surveyDate1 = document.getElementById('survey-date-1');
        const surveyDate2 = document.getElementById('survey-date-2');
        const saveBtn = document.getElementById('save-btn');
        const validationMsg = document.getElementById('validation-msg');

        // Build 30 calendar buttons
        for (let i = 1; i <= 30; i++) {
            const btn = document.createElement('button');
            btn.className = 'day-btn';
            btn.innerText = i;
            btn.onclick = () => {
                btn.classList.toggle('selected');
                updateDropdowns();
            };
            calendarGrid.appendChild(btn);
        }

        window.onload = () => {
            fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    database = data;
                    unitSelect.disabled = false;
                    document.getElementById('default-option').text = "-- Select Unit Designation --";
                    statusMsg.innerText = "Connection established.";
                    setTimeout(() => statusMsg.innerText = "", 2500);
                })
                .catch(error => {
                    statusMsg.innerText = "Error establishing connection. Please refresh the page.";
                });
        };

        unitSelect.addEventListener('change', (e) => {
            document.getElementById('calendar-section').style.display = "block";
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('selected'));
            resetForm();
            
            const selectedUnit = e.target.value;
            if (database[selectedUnit]) {
                const savedData = database[selectedUnit];
                document.querySelectorAll('.day-btn').forEach(btn => {
                    if (savedData.dates && savedData.dates.includes(btn.innerText)) {
                        btn.classList.add('selected');
                    }
                });
                updateDropdowns();
                
                if (savedData.fanDate) fanDateSelect.value = savedData.fanDate;
                if (savedData.fanTimeBlock) fanTimeSelect.value = savedData.fanTimeBlock;
                if (savedData.surveyDates) {
                    surveyDate1.value = savedData.surveyDates[0] || "";
                    surveyDate2.value = savedData.surveyDates[1] || "";
                }
                validateSchedule();
            }
        });

        function updateDropdowns() {
            const selectedButtons = document.querySelectorAll('.day-btn.selected');
            const dates = Array.from(selectedButtons).map(btn => parseInt(btn.innerText)).sort((a,b) => a - b);
            
            const currFan = fanDateSelect.value;
            const currS1 = surveyDate1.value;
            const currS2 = surveyDate2.value;

            const defaultOpt = '<option value="">-- Select Date --</option>';
            fanDateSelect.innerHTML = defaultOpt;
            surveyDate1.innerHTML = defaultOpt;
            surveyDate2.innerHTML = defaultOpt;

            if (dates.length >= 3) { 
                bookingSection.style.display = "block";
                
                dates.forEach(date => {
                    const optText = `June ${date}`;
                    fanDateSelect.add(new Option(optText, date));
                    surveyDate1.add(new Option(optText, date));
                    surveyDate2.add(new Option(optText, date));
                });

                if (dates.includes(parseInt(currFan))) fanDateSelect.value = currFan;
                if (dates.includes(parseInt(currS1))) surveyDate1.value = currS1;
                if (dates.includes(parseInt(currS2))) surveyDate2.value = currS2;
            } else {
                bookingSection.style.display = "none";
                resetForm();
            }
            validateSchedule();
        }

        function resetForm() {
            fanDateSelect.value = "";
            fanTimeSelect.value = "";
            surveyDate1.value = "";
            surveyDate2.value = "";
            validationMsg.style.display = "none";
            saveBtn.disabled = true;
        }

        function validateSchedule() {
            if (bookingSection.style.display === "none") return;

            const fDate = parseInt(fanDateSelect.value);
            const fTime = fanTimeSelect.value;
            const s1 = parseInt(surveyDate1.value);
            const s2 = parseInt(surveyDate2.value);

            validationMsg.style.display = "block";
            validationMsg.className = "validation-msg msg-error";
            saveBtn.disabled = true;

            if (!fDate || !fTime || !s1 || !s2) {
                validationMsg.innerText = "Notice: All scheduling parameters must be designated.";
                return;
            }

            if (s1 === s2) {
                validationMsg.innerText = "Error: Survey dates must occupy two distinct days.";
                return;
            }

            if (fDate >= s1 || fDate >= s2) {
                validationMsg.innerText = "Error: Installation must chronologically precede both survey dates.";
                return;
            }

            validationMsg.className = "validation-msg msg-success";
            let msg = "Schedule validated and ready for submission.";
            
            if (Math.abs(s1 - s2) === 1) {
                msg += "<span class='bonus-text'>Optimal Condition Met: Survey dates are consecutive.</span>";
            }
            
            validationMsg.innerHTML = msg;
            saveBtn.disabled = false;
        }

        function saveData() {
            const selectedUnit = unitSelect.value;
            const availableDates = Array.from(document.querySelectorAll('.day-btn.selected')).map(btn => btn.innerText);
            
            const payload = { 
                unit: selectedUnit, 
                dates: availableDates, 
                fanDate: fanDateSelect.value, 
                fanTimeBlock: fanTimeSelect.value,
                surveyDates: [surveyDate1.value, surveyDate2.value]
            };

            statusMsg.innerText = "Submitting data...";
            saveBtn.disabled = true;

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                database[selectedUnit] = payload;
                statusMsg.innerText = "Submission successful.";
                setTimeout(() => statusMsg.innerText = "", 3000);
            })
            .catch(error => {
                statusMsg.innerText = "Submission failed. Please verify your connection.";
                saveBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
